<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AegisAI - Site Blocked</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%);
    color: #fff;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 560px;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 18px;
    padding: 36px 32px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  }
  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.15);
    font-size: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  h1 { margin: 0 0 12px; font-size: 28px; }
  .url {
    margin: 16px 0;
    padding: 10px 12px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
    word-break: break-all;
  }
  .reason {
    margin-bottom: 22px;
    color: #fecaca;
  }
  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  button {
    cursor: pointer;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    transition: transform 0.05s ease, opacity 0.2s;
  }
  button:active { transform: translateY(1px); }
  .primary { background: #fff; color: #7f1d1d; }
  .ghost { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,.4); }
  .footer { margin-top: 22px; font-size: 12px; opacity: .7; }
</style>
</head>
<body>
  <div class="card">
    <div class="badge" id="badge">⛔ Blocked</div>
    <h1 id="title">This site has been blocked</h1>
    <div class="reason" id="reason">Loading...</div>

    <div>
      <div style="font-size:12px;opacity:.7;margin-bottom:6px;">Original URL</div>
      <div class="url" id="url">—</div>
    </div>

    <div class="actions">
      <button class="primary" id="back">← Go Back</button>
      <button class="ghost" id="newtab">Open New Tab</button>
    </div>

    <div class="footer">
      Protected by <strong>AegisAI</strong> · You can manage your blocklist from the extension popup.
    </div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
